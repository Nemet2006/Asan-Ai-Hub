<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DecisionLab Demo</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --line: #d8dee7;
        --text: #172033;
        --muted: #5f6b7a;
        --blue: #1b5f8f;
        --blue-deep: #10233f;
        --green: #1e7a5f;
        --accent: #b65f2a;
        --shadow: 0 16px 42px rgba(23, 32, 51, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--bg);
        font-family: Aptos, "Segoe UI", Arial, sans-serif;
      }

      .grid-bg {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image:
          linear-gradient(rgba(23, 32, 51, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 32, 51, 0.035) 1px, transparent 1px);
        background-size: 72px 72px;
      }

      .container {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 5;
        padding: 16px 0;
        background: rgba(246, 247, 249, 0.86);
        backdrop-filter: blur(14px);
      }

      .nav {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        font-weight: 800;
      }

      .brand small {
        display: block;
        color: var(--muted);
        font-weight: 500;
      }

      .badge {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background: var(--blue-deep);
        color: #fff;
      }

      .tabs,
      .actions,
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      button,
      .button {
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary,
      .tab {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--blue-deep);
      }

      .tab.active {
        border-color: var(--blue);
        background: #f2f7fb;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      main {
        padding: 36px 0 58px;
      }

      .hero,
      .two-col,
      .assessment,
      .report-grid,
      .admin-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
        gap: 22px;
        align-items: start;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.2rem, 8vw, 6.4rem);
        line-height: 0.92;
      }

      h2 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 3vw, 2.4rem);
        line-height: 1.08;
      }

      h3 {
        margin: 10px 0;
      }

      p,
      small,
      td,
      li {
        color: var(--muted);
        line-height: 1.6;
      }

      .eyebrow {
        display: inline-flex;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 8px;
        background: #e9f1f7;
        color: var(--blue-deep);
        font-size: 0.82rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .panel,
      .case-card,
      .metric,
      .case-preview,
      .rail,
      .risk-card,
      .start-panel {
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .mini-report,
      .score-list,
      .options,
      .insights,
      .feedback-grid {
        display: grid;
        gap: 12px;
      }

      .mini-report div,
      .insights li,
      .feedback-card,
      .option,
      .participant,
      .tension {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f9fafb;
      }

      .mini-report div,
      .score-row > div,
      .case-meta,
      .section-head,
      .report-head,
      .admin-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
      }

      .section {
        margin-top: 46px;
      }

      .case-grid,
      .risk-grid,
      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .case-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .skill-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .skill-cloud span {
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font-weight: 800;
      }

      .assessment {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .rail {
        position: sticky;
        top: 116px;
      }

      .rail ol,
      .insights {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .rail li {
        margin-top: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .rail li.active {
        border-color: var(--blue);
        color: var(--blue-deep);
        font-weight: 800;
      }

      .case-card {
        display: grid;
        gap: 18px;
      }

      .tension {
        border-left: 4px solid var(--accent);
        background: #fff8f3;
      }

      .option {
        width: 100%;
        min-height: 0;
        color: var(--text);
        text-align: left;
      }

      .option.selected,
      .option:hover {
        border-color: var(--blue);
        background: #f2f7fb;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        font: inherit;
      }

      .scorebar {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #e7ebf1;
      }

      .scorebar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--blue), var(--green));
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      th {
        background: #f2f5f8;
        color: var(--blue-deep);
        font-size: 0.84rem;
        text-transform: uppercase;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 960px) {
        .nav,
        .hero,
        .two-col,
        .assessment,
        .report-grid,
        .admin-grid {
          grid-template-columns: 1fr;
        }

        .case-grid,
        .risk-grid,
        .metrics {
          grid-template-columns: 1fr;
        }

        .rail {
          position: static;
        }
      }

      @media print {
        header,
        .grid-bg,
        .no-print {
          display: none !important;
        }

        body {
          background: #fff;
        }

        .container {
          width: 100%;
        }

        .panel,
        .metric,
        .case-preview,
        .risk-card {
          box-shadow: none;
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>

        started: false,
        step: 0,
        answers: [],
        selected: "",
        reason: ""
      };

      function scorebar(value) {
        return `<div class="scorebar"><span style="width:${value}%"></span></div>`;
      }

      function average(values) {
        return Math.round(values.reduce((sum, value) => sum + value, 0) / values.length);
      }

      function candidateAverage(candidate) {
        return average(skillKeys.map((key) => candidate.scores[key]));
      }

      function clamp(value) {
        return Math.max(0, Math.min(100, Math.round(value)));
      }

      function reasonBonus(reason) {
        const normalized = reason.toLocaleLowerCase("az");
        return Object.fromEntries(
          skillKeys.map((skill) => {
            const hits = keywords[skill].filter((word) => normalized.includes(word.toLocaleLowerCase("az"))).length;
            return [skill, Math.min(6, hits * 2)];
          })
        );
      }

      function calculateReport(answers) {
        const scores = Object.fromEntries(skillKeys.map((key) => [key, 62]));
        const feedback = [];

        answers.forEach((answer) => {
          const item = cases.find((entry) => entry.id === answer.caseId);
          const option = item.options.find((entry) => entry.id === answer.optionId);
          const bonus = reasonBonus(answer.reason);

          skillKeys.forEach((skill) => {
            scores[skill] += option.impact[skill] || 0;
            scores[skill] += bonus[skill] || 0;
          });

          feedback.push({
            caseTitle: item.title,
            selectedLabel: option.label,
            feedback: option.feedback,
            reasonSignal:
              answer.reason.trim().length > 70
                ? "İzah konkret idi və rubric üzrə əlavə siqnallar verdi."
                : "İzah qısa idi; real assessment-də daha konkret fakt və risk dili tələb olunardı."
          });
        });

        skillKeys.forEach((skill) => {
          scores[skill] = clamp(scores[skill]);
        });

        const sorted = [...skillKeys].sort((a, b) => scores[b] - scores[a]);
        const strongest = sorted.slice(0, 2);
        const weakest = sorted.slice(-2).reverse();

        return { scores, feedback, strongest, weakest };
      }

      function setView(view) {
        state.view = view;
        document.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === view);
        });
        document.getElementById("overview-view").classList.toggle("hidden", view !== "overview");
        document.getElementById("assessment-view").classList.toggle("hidden", view !== "assessment");
        document.getElementById("admin-view").classList.toggle("hidden", view !== "admin");
        render();
      }

      function renderOverview() {
        document.getElementById("overview-view").innerHTML = `
          <div class="hero">
            <div>
              <span class="eyebrow">AI-supported assessment platform</span>
              <h1>DecisionLab</h1>
              <p>Junior sales və customer support əməkdaşlarının real müştəri situasiyalarında necə qərar verdiyini ölçən ciddi B2B assessment demo.</p>
              <div class="actions no-print">
                <button data-view="assessment">Demo assessment aç</button>
                <button class="secondary" data-view="admin">Manager dashboard</button>
              </div>
            </div>
            <aside class="panel">
              <div class="section-head"><span>Sales demo ready</span><strong>5 case</strong></div>
              <div class="mini-report">
                <div><span>Customer empathy</span><strong>78/100</strong></div>
                <div><span>Communication</span><strong>72/100</strong></div>
                <div><span>Commercial thinking</span><strong>61/100</strong></div>
                <div><span>Risk awareness</span><strong>58/100</strong></div>
              </div>
              <p>Namizəd empatiya qurur, amma kommersiya və risk qərarlarını daha strukturlaşdırılmış əsaslandırmalıdır.</p>
            </aside>
          </div>
          <section class="section">
            <span class="eyebrow">Demo flow</span>
            <h2>Satış görüşündə göstərmək üçün tam işlək assessment axını</h2>
            <div class="case-grid">
              ${cases.map((item, index) => `<article class="case-preview"><span>Case ${index + 1}</span><h3>${item.title}</h3><p>${item.success}</p></article>`).join("")}
            </div>
          </section>
          <section class="section two-col">
            <div>
              <span class="eyebrow">Measured skills</span>
              <h2>Demo 7 davranış bacarığını ölçür</h2>
              <p>Hər seçim bacarıqlara təsir edir, yazılı izah isə keyword/rubric mock ilə əlavə siqnal verir.</p>
            </div>
            <div class="skill-cloud">${skillKeys.map((key) => `<span>${skillLabels[key]}</span>`).join("")}</div>
          </section>
          <section class="section">
            <span class="eyebrow">Scale roadmap</span>
            <h2>Demo-dan pullu pilot platformasına keçid</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Sahə</th><th>Sadə MVP</th><th>Scale versiya</th></tr></thead>
                <tbody>
                  <tr><td>Frontend</td><td>Static HTML / Next.js demo</td><td>Next.js app with workspaces</td></tr>
                  <tr><td>Backend</td><td>Local/static data</td><td>Supabase / Firebase</td></tr>
                  <tr><td>Scoring</td><td>Rubric + keyword mock</td><td>OpenAI JSON scoring + calibration</td></tr>
                  <tr><td>Reports</td><td>Browser PDF</td><td>Server-side branded PDF</td></tr>
                  <tr><td>Admin</td><td>Mock cohort dashboard</td><td>Real company/team dashboard</td></tr>
                </tbody>
              </table>
            </div>
          </section>
          <section class="section risk-grid">
            ${[
              ["AI scoring obyektivliyi", "OpenAI scoring üçün sərt JSON schema, sabit rubric və test dataset lazımdır."],
              ["Assessment etibarlılığı", "Score-ların niyə belə çıxdığı case feedback və manager interpretation ilə izah olunmalıdır."],
              ["Data privacy", "Pilotdan sonra consent, retention və company-level access control əlavə olunmalıdır."],
              ["Overengineering", "Avatar, game mexanikası və simulation engine indi satış dəyərini artırmır."]
            ].map(([title, text]) => `<article class="risk-card"><h3>${title}</h3><p>${text}</p></article>`).join("")}
          </section>
        `;
      }

      function renderAssessment() {
        const root = document.getElementById("assessment-view");
        const report = state.answers.length === cases.length ? calculateReport(state.answers) : null;

        if (!state.started) {
          root.innerHTML = `
            <div class="two-col">
              <div>
                <span class="eyebrow">5 case assessment</span>
                <h1>Junior sales və support qərarvermə testi</h1>
                <p>Demo real müştəri situasiyalarında seçim, izah və rubric feedback-i göstərir. Scoring deterministik mock-dur.</p>
              </div>
              <div class="start-panel">
                <label>İştirakçı adı<input id="candidate-name" value="${state.name}" /></label>
                <label>Rol<input id="candidate-role" value="${state.role}" /></label>
                <button id="start-assessment">Assessment başlat</button>
              </div>
            </div>
          `;
          return;
        }

        if (report) {
          const summary = `Sən ${skillLabels[report.strongest[0]].toLocaleLowerCase("az")} və ${skillLabels[report.strongest[1]].toLocaleLowerCase("az")} üzrə güclü siqnal göstərirsən, amma ${skillLabels[report.weakest[0]].toLocaleLowerCase("az")} və ${skillLabels[report.weakest[1]].toLocaleLowerCase("az")} üzrə daha strukturlaşdırılmış qərar verməlisən.`;
          root.innerHTML = `
            <div class="report-head">
              <div><span class="eyebrow">Skill report</span><h2>${state.name}</h2><p>${summary}</p></div>
              <div class="actions no-print"><button class="secondary" id="reset">Yenidən başlat</button><button onclick="window.print()">PDF export</button></div>
            </div>
            <div class="section report-grid">
              <article class="panel">
                <h2>Bacarıq nəticələri</h2>
                <div class="score-list">
                  ${skillKeys.map((key) => `<div class="score-row"><div><strong>${skillLabels[key]}</strong><span>${report.scores[key]}/100</span></div>${scorebar(report.scores[key])}</div>`).join("")}
                </div>
              </article>
              <article class="panel">
                <h2>Manager interpretation</h2>
                <ul class="insights">
                  <li><strong>Güclü sahələr</strong><br />${report.strongest.map((key) => skillLabels[key]).join(", ")}</li>
                  <li><strong>İnkişaf riski</strong><br />${report.weakest.map((key) => skillLabels[key]).join(", ")}</li>
                  <li><strong>Tövsiyə</strong><br />Nəticə role-play interview və 1 həftəlik shadowing ilə birlikdə qiymətləndirilməlidir.</li>
                </ul>
              </article>
            </div>
            <article class="section panel">
              <h2>Case feedback</h2>
              <div class="feedback-grid">
                ${report.feedback.map((item) => `<div class="feedback-card"><span>${item.caseTitle}</span><strong>${item.selectedLabel}</strong><p>${item.feedback}</p><small>${item.reasonSignal}</small></div>`).join("")}
              </div>
            </article>
          `;
          localStorage.setItem(
            "decisionlab:lastReport",
            JSON.stringify({
              name: state.name,
              role: state.role,
              completedAt: new Date().toLocaleString("az-AZ"),
              scores: report.scores
            })
          );
          return;
        }

        const item = cases[state.step];
        root.innerHTML = `
          <div class="assessment">
            <aside class="rail">
              <span class="eyebrow">Assessment</span>
              <h2>Case ${state.step + 1}/${cases.length}</h2>
              ${scorebar(Math.round(((state.step + 1) / cases.length) * 100))}
              <div class="participant"><strong>${state.name}</strong><br /><span>${state.role}</span></div>
              <ol>${cases.map((entry, index) => `<li class="${index === state.step ? "active" : ""}">${entry.title}</li>`).join("")}</ol>
            </aside>
            <section class="case-card">
              <div class="case-meta"><span>${item.role}</span><span>${item.success}</span></div>
              <h2>${item.title}</h2>
              <p>${item.context}</p>
              <div class="tension"><strong>Qərar gərginliyi</strong><br /><span>${item.tension}</span></div>
              <div class="options">
                ${item.options.map((option) => `<button class="option ${state.selected === option.id ? "selected" : ""}" data-option="${option.id}"><strong>${option.label}</strong><br /><small>${option.description}</small></button>`).join("")}
              </div>
              <label>Niyə bu qərarı verdin?
                <textarea id="reason" rows="5" placeholder="Qısa izah yaz: hansı faktı, müştəri hissini, riski və növbəti addımı nəzərə aldın?">${state.reason}</textarea>
              </label>
              <button id="submit-answer" ${!state.selected || state.reason.trim().length < 12 ? "disabled" : ""}>Cavabı təsdiqlə</button>
            </section>
          </div>
        `;
      }

      function renderAdmin() {
        let latest = null;
        try {
          latest = JSON.parse(localStorage.getItem("decisionlab:lastReport"));
        } catch (error) {
          latest = null;
        }
        const candidates = latest && latest.scores ? [latest, ...mockCandidates] : mockCandidates;
        const skillAverages = Object.fromEntries(skillKeys.map((key) => [key, average(candidates.map((item) => item.scores[key]))]));
        const ranked = [...candidates].sort((a, b) => candidateAverage(b) - candidateAverage(a));
        const weakest = [...skillKeys].sort((a, b) => skillAverages[a] - skillAverages[b]).slice(0, 3);
        const strongest = [...skillKeys].sort((a, b) => skillAverages[b] - skillAverages[a]).slice(0, 3);
        const cohortAverage = average(candidates.map(candidateAverage));

        document.getElementById("admin-view").innerHTML = `
          <div class="admin-head">
            <div>
              <span class="eyebrow">Manager dashboard</span>
              <h2>DecisionLab pilot cohort</h2>
              <p>Mock data ilə işləyir. Assessment tamamlananda son nəticə cohort sıralamasına əlavə olunur.</p>
            </div>
            <button class="no-print" onclick="window.print()">PDF export</button>
          </div>
          <div class="section metrics">
            <article class="metric"><span>Tamamlayan iştirakçı</span><h2>${candidates.length}</h2><small>Mock cohort + son local nəticə</small></article>
            <article class="metric"><span>Ortalama skill score</span><h2>${cohortAverage}/100</h2><small>7 bacarıq üzrə ümumi orta</small></article>
            <article class="metric"><span>Ən zəif bacarıq</span><h2>${skillLabels[weakest[0]]}</h2><small>${skillAverages[weakest[0]]}/100 cohort average</small></article>
            <article class="metric"><span>Ən güclü iştirakçı</span><h2>${ranked[0].name}</h2><small>${candidateAverage(ranked[0])}/100 overall</small></article>
          </div>
          <div class="section admin-grid">
            <article class="panel">
              <h2>Skill averages</h2>
              <div class="score-list">
                ${skillKeys.map((key) => `<div class="score-row"><div><strong>${skillLabels[key]}</strong><span>${skillAverages[key]}/100</span></div>${scorebar(skillAverages[key])}</div>`).join("")}
              </div>
            </article>
            <article class="panel">
              <h2>Manager insight</h2>
              <ul class="insights">
                <li><strong>Ən zəif bacarıqlar</strong><br />${weakest.map((key) => skillLabels[key]).join(", ")}</li>
                <li><strong>Ən güclü bacarıqlar</strong><br />${strongest.map((key) => skillLabels[key]).join(", ")}</li>
                <li><strong>Pilot qərarı</strong><br />Scale mərhələsində company benchmark, role threshold və training recommendation əlavə olunmalıdır.</li>
              </ul>
            </article>
          </div>
          <article class="section panel">
            <h2>İştirakçı sıralaması</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>İştirakçı</th><th>Rol</th><th>Completed</th><th>Overall</th><th>Customer empathy</th><th>Commercial thinking</th><th>Risk awareness</th></tr></thead>
                <tbody>
                  ${ranked.map((item) => `<tr><td>${item.name}</td><td>${item.role}</td><td>${item.completedAt}</td><td><strong>${candidateAverage(item)}/100</strong></td><td>${item.scores.customerEmpathy}/100</td><td>${item.scores.commercialThinking}/100</td><td>${item.scores.riskAwareness}/100</td></tr>`).join("")}
                </tbody>
              </table>
            </div>
          </article>
        `;
      }

      function render() {
        renderOverview();
        renderAssessment();
        renderAdmin();
      }

      document.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        if (viewButton) setView(viewButton.dataset.view);

        const option = event.target.closest("[data-option]");
        if (option) {
          state.selected = option.dataset.option;
          state.reason = document.getElementById("reason")?.value || state.reason;
          renderAssessment();
        }

        if (event.target.id === "start-assessment") {
          state.name = document.getElementById("candidate-name").value || "Demo namizəd";
          state.role = document.getElementById("candidate-role").value || "Junior support / sales";
          state.started = true;
          state.step = 0;
          state.answers = [];
          state.selected = "";
          state.reason = "";
          renderAssessment();
        }

        if (event.target.id === "submit-answer") {
          state.answers.push({
            caseId: cases[state.step].id,
            optionId: state.selected,
            reason: state.reason
          });
          state.step += 1;
          state.selected = "";
          state.reason = "";
          renderAssessment();
        }

        if (event.target.id === "reset") {
          state.started = false;
          state.step = 0;
          state.answers = [];
          state.selected = "";
          state.reason = "";
          renderAssessment();
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "reason") {
          state.reason = event.target.value;
          const submit = document.getElementById("submit-answer");
          if (submit) submit.disabled = !state.selected || state.reason.trim().length < 12;
        }
      });

      render();
    </script>
  </body>
</html>
